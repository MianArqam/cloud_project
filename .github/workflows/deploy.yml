name: Deploy Smart Disaster Management System to AWS

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 📥 STEP 1: CHECKOUT CODE
      # ==========================================
      - name: Checkout Code
        uses: actions/checkout@v3

      # ==========================================
      # 🧼 STEP 1.5: SANITIZE & VALIDATE AWS CREDENTIALS
      # ==========================================
      - name: Sanitize & Validate AWS Credentials
        run: |
          RAW_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          RAW_SECRET="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          
          echo "=========================================="
          echo "🔍 DIAGNOSTIC: Checking your GitHub Secrets..."
          echo "• AWS_ACCESS_KEY_ID has ${#RAW_ID} characters."
          echo "• AWS_SECRET_ACCESS_KEY has ${#RAW_SECRET} characters."
          echo "=========================================="

          # 1. Check if keys are swapped or incorrect
          if [[ "$RAW_ID" == *"/"* ]]; then
            echo "❌ ERROR: Your AWS_ACCESS_KEY_ID secret contains a forward slash (/)!"
            echo "👉 This proves you pasted your 'Secret Access Key' into 'AWS_ACCESS_KEY_ID'."
            echo "👉 Please edit your GitHub Secrets and swap them back!"
            exit 1
          fi

          if [[ ${#RAW_ID} -eq 40 ]]; then
            echo "❌ ERROR: Your AWS_ACCESS_KEY_ID is 40 characters long!"
            echo "👉 40 characters is the length of a 'Secret Access Key'. Your keys are swapped."
            echo "👉 Please edit your GitHub Secrets and swap them back!"
            exit 1
          fi

          if [[ ${#RAW_SECRET} -eq 20 ]]; then
            echo "❌ ERROR: Your AWS_SECRET_ACCESS_KEY is only 20 characters long!"
            echo "👉 20 characters is the length of an 'Access Key ID'. Your keys are swapped."
            echo "👉 Please edit your GitHub Secrets and swap them back!"
            exit 1
          fi

          # 2. Perform sanitization (strip any leading/trailing Excel whitespace)
          CLEAN_ID=$(echo "$RAW_ID" | tr -d '[:space:]')
          CLEAN_SECRET=$(echo "$RAW_SECRET" | tr -d '[:space:]')
          
          # 3. Export clean keys to GITHUB_ENV for all subsequent actions
          echo "AWS_ACCESS_KEY_ID=$CLEAN_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$CLEAN_SECRET" >> $GITHUB_ENV
          echo "✅ Credentials validated and cleaned successfully!"

      # ==========================================
      # 🔧 STEP 2: CONFIGURE AWS CREDENTIALS
      # ==========================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ==========================================
      # 🏗️ STEP 3: SETUP TERRAFORM
      # ==========================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false # Disabled to easily read raw outputs in steps

      - name: Ensure Terraform State Bucket Exists
        run: |
          aws s3api head-bucket --bucket cloud-project-tfstate-mianarqam 2>/dev/null || \
          aws s3api create-bucket --bucket cloud-project-tfstate-mianarqam --region us-east-1

      # ==========================================
      # 🧱 STEP 4: PROVISION INFRASTRUCTURE
      # ==========================================
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

      # ==========================================
      # 🌐 STEP 5: FETCH TERRAFORM OUTPUTS
      # ==========================================
      - name: Fetch Deployment Endpoints
        id: tf-outputs
        run: |
          ALB_DNS=$(terraform output -raw backend_alb_dns_name)
          S3_BUCKET=$(terraform output -raw s3_bucket_name)
          ECR_REPO=$(terraform output -raw ecr_repository_url)
          CF_DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[0].Id=='S3-Frontend'].Id" --output text)
          
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          echo "ECR_REPO=$ECR_REPO" >> $GITHUB_ENV
          echo "CF_DIST_ID=$CF_DIST_ID" >> $GITHUB_ENV
        working-directory: ./terraform

      # ==========================================
      # 🐳 STEP 6: BUILD & PUSH BACKEND TO ECR
      # ==========================================
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push Backend Image
        run: |
          docker build -t $ECR_REPO:latest ./backend
          docker push $ECR_REPO:latest

      - name: Trigger ECS Fargate Rolling Update
        run: |
          aws ecs update-service --cluster cloud-project-ecs-cluster --service cloud-project-service --force-new-deployment

      # ==========================================
      # 💻 STEP 7: BUILD FRONTEND (WITH ALB URL)
      # ==========================================
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      - name: Build Frontend React App
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: http://${{ env.ALB_DNS }}/api
          VITE_SOCKET_URL: http://${{ env.ALB_DNS }}

      # ==========================================
      # 📤 STEP 8: UPLOAD FRONTEND TO S3 & INVALIDATE CDN
      # ==========================================
      - name: Deploy Frontend to S3 Bucket
        run: |
          aws s3 sync ./frontend/dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront CDN Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.CF_DIST_ID }} --paths "/*"
